services:
  audio-encoder:
    build: .
    image: audio-encoder:latest

    # Bind to localhost only — put nginx in front for TLS and rate limiting
    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      # Only the storage directory is writable; everything else is read-only
      - ./storage:/app/storage:rw

    user: "1001:1001"

    # Read-only root filesystem; writable /tmp for ffmpeg scratch space
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777

    security_opt:
      - no-new-privileges:true   # prevent privilege escalation via setuid binaries

    cap_drop:
      - ALL                      # drop every Linux capability the process doesn't need

    # Hard resource caps — limits blast radius of a runaway conversion job
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
